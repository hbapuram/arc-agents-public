<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F4632"/>
      <stop offset="1" stop-color="#0E261B"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8FB89E"/>
      <stop offset="0.5" stop-color="#E8C76A"/>
      <stop offset="1" stop-color="#D98E6A"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#FCEBBE"/>
      <stop offset="0.55" stop-color="#EAC96C"/>
      <stop offset="1" stop-color="#D98E6A"/>
    </radialGradient>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#sky)"/>

  <!-- arcs rising over the sun -->
  <path d="M22 60 A 28 28 0 0 1 78 60" stroke="url(#arc)" stroke-width="4.5"
        fill="none" stroke-linecap="round" opacity="0.40"/>
  <path d="M30 60 A 20 20 0 0 1 70 60" stroke="url(#arc)" stroke-width="4.5"
        fill="none" stroke-linecap="round" opacity="0.72"/>

  <!-- sun -->
  <circle cx="50" cy="60" r="11" fill="url(#sun)"/>

  <!-- horizon -->
  <rect x="24" y="64.5" width="52" height="3.5" rx="1.75" fill="#8FB89E" opacity="0.45"/>
</svg>
